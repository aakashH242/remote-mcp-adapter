{{- if .Values.podDisruptionBudget }}
apiVersion: {{ include "remote-mcp-adapter.podDisruptionBudget.apiVersion" . }}
kind: PodDisruptionBudget
metadata:
  name: {{ include "remote-mcp-adapter.fullname" . }}
  namespace: {{ include "remote-mcp-adapter.namespace" . }}
  labels:
    {{- include "remote-mcp-adapter.labels" . | nindent 4 }}
    {{- with .Values.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- with .Values.podDisruptionBudget.minAvailable }}
  minAvailable: {{ . }}
  {{- end }}
  {{- with .Values.podDisruptionBudget.maxUnavailable }}
  maxUnavailable: {{ . }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "remote-mcp-adapter.selectorLabels" . | nindent 6 }}
{{- end }}