{{- if eq .Values.deploymentMode "distributed" }}
{{- $sharedMountPath := include "remote-mcp-adapter.sharedMountPath" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "remote-mcp-adapter.fullname" . }}
  labels:
    {{- include "remote-mcp-adapter.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "remote-mcp-adapter.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "remote-mcp-adapter.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          {{- if .Values.startCommand }}
          command: {{ .Values.startCommand }}
          {{- end }}
          {{- include "remote-mcp-adapter.renderEnvironment" (dict "root" $ "fixedEnv" (dict "MCP_ADAPTER_CONFIG" (include "remote-mcp-adapter.configFilePath" .)) "environment" .Values.environment) | nindent 10 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: {{ include "remote-mcp-adapter.configDirectory" . | quote }}
              readOnly: true
            - name: shared
              mountPath: {{ $sharedMountPath | quote }}
          {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
          {{- end }}

      volumes:
        - name: config
          configMap:
            name: {{ include "remote-mcp-adapter.configMapName" . }}
            items:
              - key: config.yaml
                path: config.yaml
        - name: shared
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim | default (include "remote-mcp-adapter.fullname" .) | quote }}
          {{- else }}
          emptyDir:
            {{- toYaml .Values.persistence.emptyDir | nindent 12 }}
          {{- end }}

      {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      affinity:
        {{- if .Values.strictAntiAffinity }}
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: "app.kubernetes.io/name"
                    operator: In
                    values:
                      - {{ include "remote-mcp-adapter.name" . }}
              topologyKey: "kubernetes.io/hostname"
        {{- else }}
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: "app.kubernetes.io/name"
                      operator: In
                      values:
                        - {{ include "remote-mcp-adapter.name" . }}
                topologyKey: "kubernetes.io/hostname"
        {{- end }}
      {{- with .Values.affinity }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
      {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- end }}
