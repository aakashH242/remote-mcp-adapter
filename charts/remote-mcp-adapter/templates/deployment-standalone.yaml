{{- if eq .Values.deploymentMode "standalone" }}
{{- $upstreamServers := .Values.upstreamServers | default (list) -}}
{{- $sharedMountPath := include "remote-mcp-adapter.sharedMountPath" . -}}
{{- if empty $upstreamServers -}}
{{- fail "Values.upstreamServers must contain at least one entry when deploymentMode is standalone." -}}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "remote-mcp-adapter.fullname" . }}
  labels:
    {{- include "remote-mcp-adapter.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "remote-mcp-adapter.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "remote-mcp-adapter.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          {{- if .Values.startCommand }}
          command: {{ .Values.startCommand }}
          {{- end }}
          {{- include "remote-mcp-adapter.renderEnvironment" (dict "root" $ "fixedEnv" (dict "MCP_ADAPTER_CONFIG" (include "remote-mcp-adapter.configFilePath" .)) "environment" .Values.environment) | nindent 10 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: {{ include "remote-mcp-adapter.configDirectory" . | quote }}
              readOnly: true
            - name: shared
              mountPath: {{ $sharedMountPath | quote }}
          {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
          {{- end }}

        {{- range $index, $upstream := $upstreamServers }}
        {{- $upstreamName := default (printf "upstream-%d" (add1 $index)) $upstream.name }}
        {{- $upstreamImage := default (dict) $upstream.image }}
        {{- $upstreamService := default (dict) $upstream.service }}
        - name: {{ $upstreamName | lower | replace "_" "-" | trunc 63 | trimSuffix "-" }}
          command:
            {{- toYaml ($upstream.startCommand | default (list "node")) | nindent 12 }}
          {{- if $upstream.args }}
          args:
            {{- tpl (toYaml $upstream.args) $ | nindent 12 }}
          {{- end }}
          {{- include "remote-mcp-adapter.renderEnvironment" (dict "root" $ "fixedEnv" (dict) "environment" $upstream.environment) | nindent 10 }}
          securityContext:
            {{- toYaml ($upstream.securityContext | default (dict "allowPrivilegeEscalation" false "readOnlyRootFilesystem" false "capabilities" (dict "drop" (list "ALL")))) | nindent 12 }}
          image: "{{ default "mcr.microsoft.com/playwright/mcp" $upstreamImage.repository }}:{{ default "v0.0.68" $upstreamImage.tag }}"
          imagePullPolicy: {{ default "IfNotPresent" $upstreamImage.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ default 8931 $upstreamService.port }}
              protocol: TCP
          resources:
            {{- toYaml ($upstream.resources | default dict) | nindent 12 }}
          volumeMounts:
            - name: shared
              mountPath: {{ $sharedMountPath | quote }}
          {{- with $.Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $upstream.volumeMounts }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- end }}

      volumes:
        - name: config
          configMap:
            name: {{ include "remote-mcp-adapter.configMapName" . }}
            items:
              - key: config.yaml
                path: config.yaml
        - name: shared
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim | default (include "remote-mcp-adapter.fullname" .) | quote }}
          {{- else }}
          emptyDir:
            {{- toYaml .Values.persistence.emptyDir | nindent 12 }}
          {{- end }}

      {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      affinity:
        {{- if .Values.strictAntiAffinity }}
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: "app.kubernetes.io/name"
                    operator: In
                    values:
                      - {{ include "remote-mcp-adapter.name" . }}
              topologyKey: "kubernetes.io/hostname"
        {{- else }}
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: "app.kubernetes.io/name"
                      operator: In
                      values:
                        - {{ include "remote-mcp-adapter.name" . }}
                topologyKey: "kubernetes.io/hostname"
        {{- end }}
      {{- with .Values.affinity }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
      {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- end }}
