name: Docs

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - CHANGELOG.md
  push:
    branches: [main]
    paths-ignore:
      - CHANGELOG.md

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MkDocs toolchain
        run: |
          python -m pip install --upgrade pip
          pip install \
            mkdocs \
            mkdocs-material \
            mkdocstrings-python \
            mkdocs-git-revision-date-localized-plugin \
            mkdocs-minify-html-plugin \
            mkdocs-copy-to-llm \
            mkdocs-to-pdf \
            pymdown-extensions

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Regenerate config reference
        run: render-config-reference

      - name: Check generated docs are committed
        run: git diff --exit-code -- docs/configuration/config-reference.md

      - name: Build docs (strict)
        run: mkdocs build --strict

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MkDocs toolchain
        run: |
          python -m pip install --upgrade pip
          pip install \
            mkdocs \
            mkdocs-material \
            mkdocstrings-python \
            mkdocs-git-revision-date-localized-plugin \
            mkdocs-minify-html-plugin \
            mkdocs-copy-to-llm \
            mkdocs-to-pdf \
            pymdown-extensions

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Regenerate config reference
        run: render-config-reference

      - name: Build docs
        run: mkdocs build

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
