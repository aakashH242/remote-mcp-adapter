name: Release Changelog

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to write in changelog (for example v0.1.0)"
        required: true
        type: string
      release_name:
        description: "Optional release title"
        required: false
        type: string
      release_url:
        description: "Optional release URL"
        required: false
        type: string
      release_published_at:
        description: "Optional ISO timestamp (defaults to current UTC time)"
        required: false
        type: string
      release_body:
        description: "Optional markdown release notes"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  update-changelog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Update CHANGELOG.md with release notes
        id: changelog
        env:
          RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || github.event.inputs.release_tag }}
          RELEASE_NAME: ${{ github.event_name == 'release' && github.event.release.name || github.event.inputs.release_name }}
          RELEASE_URL: ${{ github.event_name == 'release' && github.event.release.html_url || github.event.inputs.release_url }}
          RELEASE_PUBLISHED_AT: ${{ github.event_name == 'release' && github.event.release.published_at || github.event.inputs.release_published_at }}
          RELEASE_BODY: ${{ github.event_name == 'release' && github.event.release.body || github.event.inputs.release_body }}
        run: |
          set -euo pipefail

          if [ -z "${RELEASE_TAG}" ]; then
            echo "release_tag is required"
            exit 1
          fi
          if [ -z "${RELEASE_PUBLISHED_AT}" ]; then
            RELEASE_PUBLISHED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          fi
          if [ -z "${RELEASE_URL}" ]; then
            RELEASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${RELEASE_TAG}"
          fi

          release_date="${RELEASE_PUBLISHED_AT%%T*}"
          release_heading="## ${RELEASE_TAG} - ${release_date}"
          safe_tag="$(echo "${RELEASE_TAG}" | sed 's/[^A-Za-z0-9._-]/-/g')"
          echo "safe_tag=${safe_tag}" >> "$GITHUB_OUTPUT"

          if [ -f CHANGELOG.md ] && grep -Fq "${release_heading}" CHANGELOG.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ ! -f CHANGELOG.md ]; then
            printf "# Changelog\n\nAll notable changes to this project are documented in this file.\n" > CHANGELOG.md
          fi

          if ! grep -q '^# Changelog' CHANGELOG.md; then
            {
              echo "# Changelog"
              echo
              cat CHANGELOG.md
            } > CHANGELOG.md.new
            mv CHANGELOG.md.new CHANGELOG.md
          fi

          {
            echo "${release_heading}"
            echo
            if [ -n "${RELEASE_NAME}" ]; then
              echo "**Release:** ${RELEASE_NAME}"
              echo
            fi
            echo "- Tag: [\`${RELEASE_TAG}\`](${RELEASE_URL})"
            if printf "%s" "${RELEASE_BODY}" | tr -d '[:space:]' | grep -q .; then
              echo
              printf "%s\n" "${RELEASE_BODY}" | sed 's/\r$//'
            else
              echo "- Notes: Release published on GitHub."
            fi
          } > release-entry.md

          {
            head -n 1 CHANGELOG.md
            echo
            cat release-entry.md
            echo
            tail -n +2 CHANGELOG.md
          } > CHANGELOG.md.new
          mv CHANGELOG.md.new CHANGELOG.md
          rm -f release-entry.md

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Open changelog PR
        if: steps.changelog.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          add-paths: CHANGELOG.md
          base: ${{ github.event.repository.default_branch }}
          branch: chore/changelog-${{ steps.changelog.outputs.safe_tag }}
          commit-message: "docs(changelog): add release ${{ github.event.release.tag_name }}"
          title: "docs(changelog): add release ${{ github.event.release.tag_name }}"
          body: |
            Automated changelog update for release `${{ github.event.release.tag_name }}`.
          labels: documentation
          delete-branch: true
