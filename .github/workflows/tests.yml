name: Tests

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run unit tests with coverage (>=80%)
        run: |
          uv run pytest tests \
            --cov=src/remote_mcp_adapter \
            --cov-report=term-missing \
            --cov-fail-under=80
