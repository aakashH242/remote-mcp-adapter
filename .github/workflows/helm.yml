name: Helm CI and Release

on:
  pull_request:
    branches: [main]
    paths:
      - "charts/remote-mcp-adapter/**"
      - ".github/workflows/helm.yml"
  push:
    branches: [main]
    paths:
      - "charts/remote-mcp-adapter/**"
      - ".github/workflows/helm.yml"

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        k8s_version: ["1.29.0", "1.32.0", "1.35.0"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up kubeconform
        uses: bmuschko/setup-kubeconform@v1
        with:
          kubeconform-version: "0.7.0"

      - name: Lint chart
        run: helm lint ./charts/remote-mcp-adapter --kube-version "${{ matrix.k8s_version }}"

      - name: Render templates
        run: |
          helm template remote-mcp-adapter ./charts/remote-mcp-adapter \
            --debug \
            --kube-version "${{ matrix.k8s_version }}" \
            > rendered.yaml

      - name: Validate rendered manifests with kubeconform
        run: |
          kubeconform \
            -strict \
            -ignore-missing-schemas \
            -summary \
            -kubernetes-version "${{ matrix.k8s_version }}" \
            rendered.yaml

      - name: Package chart
        run: |
          mkdir -p /tmp/chart-packages
          helm package ./charts/remote-mcp-adapter --destination /tmp/chart-packages

  release:
    if: github.event_name == 'push'
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Release chart
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: charts
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"