site_name: Remote MCP Adapter
site_description: "Config-driven MCP proxy that adds session-safe file uploads, artifact handling, and robust state and health controls for upstream MCP servers."
site_url: "https://aakashh242.github.io/remote-mcp-adapter/"
site_author: "Aakash"
repo_url: "https://github.com/aakashh242/remote-mcp-adapter"
repo_name: "aakashh242/remote-mcp-adapter"

docs_dir: docs
site_dir: site
use_directory_urls: true

theme:
  name: material
  language: en
  palette:
    - scheme: slate
      primary: black
      accent: light green
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: black
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  features:
    - navigation.top
    - navigation.tracking
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.instant.preview
#    - navigation.tabs
#    - navigation.tabs.sticky
    - navigation.path
    - navigation.prune
    - navigation.indexes
    - navigation.top
    - navigation.footer
    #    - toc.integrate
    - toc.follow
    - header.autohide
    - announce.dismiss
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.select
    - content.code.annotate
    - content.tooltips
    - content.footnote.tooltips
  icon:
    repo: fontawesome/brands/github

nav:
  - Overview: index.md
  - Getting Started: getting-started.md
  - Core Concepts: core-concepts.md
  - How It Works: how-it-works.md
  - Configuration:
      - Overview: configuration.md
      - Detailed Reference: configuration/config-reference.md
      - Example Scenarios:
          - Passthrough-only gateway: configuration/passthrough-only-gateway.md
          - Local development: configuration/local-dev.md
          - Single node: configuration/single-node-durable.md
          - Distributed: configuration/distributed-production.md
          - High security: configuration/high-security.md
          - Strict quotas and restrictions: configuration/restricted-limits.md
          - High observability: configuration/high-observability.md
          - Agent-optimized Code Mode: configuration/agent-optimized-code-mode.md
          - Public demo downloads: configuration/public-demo-downloads.md
          - Private demo links: configuration/private-demo-links.md
  - Security:
      - Overview: security/index.md
      - Threat Model: security/threat-model.md
      - Current Defenses: security/current-defenses.md
      - Auth and Session Boundaries: security/auth-and-session-boundaries.md
      - Tool Metadata Controls: security/tool-metadata-controls.md
      - Tool Definition Pinning: security/tool-definition-pinning.md
  - Telemetry: telemetry.md
  - Deployment:
      - Deployment: deployment.md
      - Deploy with Docker Compose: deployment/compose.md
      - Deploy with Helm:
          - Overview: deployment/helm.md
          - Choose a shape: deployment/helm/choose-a-shape.md
          - Standalone quick start: deployment/helm/standalone-quickstart.md
          - Standalone durable service: deployment/helm/standalone-durable.md
          - Distributed shared platform: deployment/helm/distributed-shared-platform.md
          - HA adapter tier: deployment/helm/ha-adapter-tier.md
          - Browser-facing ingress: deployment/helm/browser-facing-ingress.md
          - Observability-first production: deployment/helm/observability-first-production.md
          - Example values files: deployment/helm/example-values-files.md
          - Layered values-file pairs: deployment/helm/layered-values-file-pairs.md
          - Post-install verification: deployment/helm/post-install-verification.md
  - Health: health.md
  - Troubleshooting: troubleshooting.md
  - API Reference:
      - Overview: api/index.md
      - Public API: api/public.md
      - Internal API: api/internal.md

plugins:
  - copy-to-llm:
      button_hover_color: "var(--md-primary-fg-color)"
      toast_bg_color: "var(--md-primary-fg-color)"
      repo_url: "https://raw.githubusercontent.com/aakashh242/remote-mcp-adapter/main/docs"
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            separate_signature: true
            show_source: true
  - git-revision-date-localized:
      enabled: !ENV [CI, true]
      fallback_to_build_date: true
      type: date
      enable_creation_date: false
  - minify_html:
      allow_noncompliant_unquoted_attribute_values: false
      allow_optimal_entities: false
      allow_removing_spaces_between_attributes: false
      keep_closing_tags: false
      keep_comments: false
      keep_html_and_head_opening_tags: false
      keep_input_type_text_attr: true
      keep_ssi_comments: false
      minify_css: true
      minify_doctype: false
      minify_js: true
      preserve_brace_template_syntax: false
      preserve_chevron_percent_template_syntax: false
      remove_bangs: false
      remove_processing_instructions: false

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true

  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.mark
  - pymdownx.caret
  - pymdownx.tilde
  - pymdownx.smartsymbols
  - pymdownx.tasklist:
      custom_checkbox: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: "https://github.com/aakashh242/remote-mcp-adapter"
      name: "GitHub"

extra_css:
  - assets/stylesheets/site-overrides.css
